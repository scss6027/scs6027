name: Ticket Modify Workflow

on:
  repository_dispatch:
    types:
      - modify_ticket

permissions:
  contents: write

jobs:
  modify_ticket:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and load ticket
        shell: bash
        run: |
          set -e

          EMAIL="${{ github.event.client_payload.email }}"
          TICKET_NUM="${{ github.event.client_payload.ticketNumber }}"
          COMMENT="${{ github.event.client_payload.comment }}"
          NEW_STATUS="${{ github.event.client_payload.status }}"

          TICKET_FILE="scs6027Tickets/${TICKET_NUM}.txt"

          if [ ! -f "$TICKET_FILE" ]; then
            echo "Ticket file does not exist."
            exit 1
          fi

          OWNER_EMAIL=$(grep "^Submitted by:" "$TICKET_FILE" | cut -d':' -f2- | xargs)

          if [ "$OWNER_EMAIL" != "$EMAIL" ]; then
            echo "Unauthorized ticket modification attempt."
            exit 1
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Insert comment above Status line
          if [ -n "$COMMENT" ]; then
            sed -i "/^Status:/i\\[$TIMESTAMP] $EMAIL: $COMMENT" "$TICKET_FILE"
          fi

          # Ensure Status is always the final line
          if [ -n "$NEW_STATUS" ]; then
            sed -i "/^Status:/d" "$TICKET_FILE"
            echo "Status: $NEW_STATUS" >> "$TICKET_FILE"
          fi

      - name: Commit and push update
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "Updated ticket #${{ github.event.client_payload.ticketNumber }}"
          branch: main
          author_name: "Ticket System"
          author_email: "admin@scs6027.github.io"
          commit_user_token: ${{ secrets.TicketMasterPAT }}

      - name: Done
        run: echo "Ticket #${{ github.event.client_payload.ticketNumber }} updated successfully."
