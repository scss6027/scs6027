name: Process New Ticket

on:
  repository_dispatch:
    types: [new_ticket]

jobs:
  create_ticket:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Create tickets folder if missing
        run: mkdir -p scs6027Tickets

      - name: Determine next ticket number
        id: ticket_number
        run: |
          LAST=$(ls scs6027Tickets | grep -E '^[0-9]{4}\.txt$' | sort | tail -n1 | sed 's/.txt//')
          if [ -z "$LAST" ]; then
            NUM=0001
          else
            NUM=$(printf "%04d" $((10#$LAST + 1)))
          fi
          echo "TICKET_NUM=$NUM" >> $GITHUB_ENV

      - name: Save ticket to file
        run: |
          PAYLOAD='${{ github.event.client_payload | toJson }}'
          echo "Ticket Number: $TICKET_NUM" > scs6027Tickets/$TICKET_NUM.txt
          echo "Date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> scs6027Tickets/$TICKET_NUM.txt
          echo "Submitted by: ${{ github.event.client_payload.email }}" >> scs6027Tickets/$TICKET_NUM.txt
          echo "Subject: ${{ github.event.client_payload.subject }}" >> scs6027Tickets/$TICKET_NUM.txt
          echo "Description:" >> scs6027Tickets/$TICKET_NUM.txt
          echo "${{ github.event.client_payload.description }}" >> scs6027Tickets/$TICKET_NUM.txt

      - name: Update users-tickets JSON
        run: |
          USERS_FILE=scs6027UsersTickets.json
          if [ ! -f "$USERS_FILE" ]; then
            echo "{}" > $USERS_FILE
          fi

          EMAIL="${{ github.event.client_payload.email }}"
          SUBJECT="${{ github.event.client_payload.subject }}"
          DESC="${{ github.event.client_payload.description }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TICKET_NUM=$TICKET_NUM

          # Add new ticket to JSON using jq
          TMP=$(mktemp)
          jq --arg email "$EMAIL" \
             --arg num "$TICKET_NUM" \
             --arg date "$DATE" \
             --arg subject "$SUBJECT" \
             --arg desc "$DESC" \
             '.[$email] += [{"ticketNumber": $num, "date": $date, "subject": $subject, "description": $desc}] // [{"ticketNumber": $num, "date": $date, "subject": $subject, "description": $desc}]' \
             $USERS_FILE > $TMP
          mv $TMP $USERS_FILE

      - name: Commit & Push
        run: |
          git config user.name "SCS6027 Bot"
          git config user.email "admin@scss6027.github.io"
          git add scs6027Tickets/$TICKET_NUM.txt scs6027UsersTickets.json
          git commit -m "Add ticket $TICKET_NUM"
          git push
