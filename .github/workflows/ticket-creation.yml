name: Ticket Creation Workflow

on:
  repository_dispatch:
    types: [new_ticket]

jobs:
  create_ticket:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare folders and files
        run: |
          mkdir -p scs6027Tickets

          if [ ! -f scs6027UsersTickets.json ]; then
            echo "{}" > scs6027UsersTickets.json
          fi

          if [ ! -f scs6027Tickets/latestTickets.json ]; then
            echo "{}" > scs6027Tickets/latestTickets.json
          fi

      - name: Generate next ticket number
        run: |
          LAST=$(ls scs6027Tickets | grep '\.txt$' | sort | tail -1 | sed 's/\.txt//' || echo "0000")
          NEXT=$(printf "%04d" $((10#$LAST + 1)))
          echo "NEXT_TICKET=$NEXT" >> $GITHUB_ENV

      - name: Create ticket file
        run: |
          FILE="scs6027Tickets/${{ env.NEXT_TICKET }}.txt"

          {
            echo "Ticket Number: ${{ env.NEXT_TICKET }}"
            echo "Date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "Submitted by: ${{ github.event.client_payload.email }}"
            echo "Subject: ${{ github.event.client_payload.subject }}"
            echo "Description:"
            echo "${{ github.event.client_payload.description }}"
            echo ""
            echo "Status: ${{ github.event.client_payload.status }}"
          } > "$FILE"

      - name: Update scs6027UsersTickets.json
        run: |
          EMAIL="${{ github.event.client_payload.email }}"
          TICKET="${{ env.NEXT_TICKET }}"
          TMP=$(mktemp)

          jq --arg email "$EMAIL" --arg ticket "$TICKET" '
            .[$email] = (.[$email] // []) + [$ticket]
          ' scs6027UsersTickets.json > "$TMP"

          mv "$TMP" scs6027UsersTickets.json

      - name: Update latestTickets.json
        run: |
          EMAIL="${{ github.event.client_payload.email }}"
          TICKET="${{ env.NEXT_TICKET }}"
          TMP=$(mktemp)

          jq --arg email "$EMAIL" --arg ticket "$TICKET" '
            .[$email] = $ticket
          ' scs6027Tickets/latestTickets.json > "$TMP"

          mv "$TMP" scs6027Tickets/latestTickets.json

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "New ticket #${{ env.NEXT_TICKET }} submitted"
          branch: main
          author_name: "Ticket System"
          author_email: "admin@scss6027.github.io"
          commit_user_token: ${{ secrets.TicketMasterPAT }}

      - name: Done
        run: echo "Ticket #${{ env.NEXT_TICKET }} successfully created."
