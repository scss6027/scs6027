<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modify Ticket Registry - SCSS6027</title>
  <link rel="stylesheet" href="https://scss6027.github.io/main/style-public.css">
  
  <script src="js/auth.js"></script>
  <script>if (!sessionStorage.getItem("consoleAuth")) { window.location.href = "login.html"; }</script>

  <style>
    body { background-color: #050a05; color: #00ff41; font-family: 'Courier New', monospace; }
    main { max-width: 700px; margin: 40px auto; padding: 20px; border: 1px solid #00ff41; box-shadow: 0 0 10px #00ff41; background: #000; }
    h2 { text-align: center; text-decoration: underline; text-transform: uppercase; }
    .security-panel { border: 1px dashed #ff3333; padding: 15px; margin-bottom: 20px; background: #110000; }
    form { display: flex; flex-direction: column; gap: 15px; }
    label { font-weight: bold; font-size: 0.9rem; }
    input, textarea { padding: 10px; background: #111; border: 1px solid #00ff41; color: #00ff41; font-family: inherit; outline: none; }
    button { padding: 12px; background: #00ff41; color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
    button:hover { background: #fff; }
    #statusMsg { margin-top: 20px; font-weight: bold; white-space: pre-wrap; border-top: 1px solid #00ff41; padding-top: 10px; }
    .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; z-index: 10; pointer-events: none; }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <main>
    <h2>TICKET_MODIFICATION_TERMINAL</h2>

    <!-- Security Gate: Token Input -->
    <div class="security-panel">
      <label>ACCESS_TOKEN (ELIYAH-SCSS6027):</label><br>
      <input type="password" id="gh-token" placeholder="Enter GitHub PAT" style="width: 75%;">
      <button onclick="lockToken()" style="width: 20%; background: #ff3333; color: white;">LOCK</button>
    </div>

    <form id="modify-form">
      <label>TICKET_NUMBER_ID:</label>
      <input type="number" id="ticketNumber" required>

      <label>UPDATED_DESCRIPTION:</label>
      <textarea id="description" rows="5" required></textarea>

      <button type="submit" id="submit-btn">EXECUTE_GITHUB_COMMIT</button>
    </form>

    <div id="statusMsg">SYSTEM_READY...</div>
  </main>

  <script>
    const GITHUB_API_URL = "https://api.github.com/repos/SCSS6027/FIREBASE/contents/_data/tickets.json";
    const userEmail = sessionStorage.getItem("consoleAuth");

    function lockToken() {
      const token = document.getElementById('gh-token').value;
      if (token) {
        sessionStorage.setItem('temp_pat', token);
        alert("TOKEN_LOCKED_FOR_SESSION");
      }
    }

    document.getElementById('modify-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const status = document.getElementById('statusMsg');
      const btn = document.getElementById('submit-btn');
      const pat = sessionStorage.getItem('temp_pat');

      if (!pat) {
        alert("ERROR: ACCESS_TOKEN_REQUIRED");
        return;
      }

      btn.disabled = true;
      status.style.color = "#00ff41";
      status.textContent = "INITIATING_API_HANDSHAKE...";

      try {
        // 1. GET CURRENT FILE (To get SHA and Data)
        const getRes = await fetch(GITHUB_API_URL, {
          headers: { "Authorization": `token ${pat}` }
        });
        
        if (!getRes.ok) throw new Error("AUTH_FAILURE: Check your PAT.");
        
        const fileData = await getRes.json();
        const sha = fileData.sha;
        const tickets = JSON.parse(atob(fileData.content));

        // 2. FIND AND MODIFY
        const tID = parseInt(document.getElementById('ticketNumber').value);
        const newDesc = document.getElementById('description').value;
        const index = tickets.findIndex(t => t.TicketNumber === tID);

        if (index === -1) throw new Error("TICKET_ID_NOT_FOUND");
        
        // Security: Can only modify own tickets
        if (tickets[index].EmailAddress.toLowerCase() !== userEmail.toLowerCase()) {
          throw new Error("IDENTITY_MISMATCH: ACCESS_DENIED");
        }

        tickets[index].Description = newDesc;
        tickets[index].Updated = new Date().toISOString();

        // 3. PUSH TO GITHUB
        status.textContent = "PREPARING_COMMIT_PAYLOAD...";
        const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(tickets, null, 2))));

        const putRes = await fetch(GITHUB_API_URL, {
          method: "PUT",
          headers: { 
            "Authorization": `token ${pat}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: `Update Ticket #${tID} via Retro Terminal`,
            content: updatedContent,
            sha: sha
          })
        });

        if (putRes.ok) {
          status.textContent = "SUCCESS: GITHUB_REGISTRY_UPDATED.\nREBUILD_TRIGGERED.";
          alert("MODIFICATION_SUCCESSFUL");
        } else {
          const err = await putRes.json();
          throw new Error(err.message);
        }

      } catch (err) {
        status.style.color = "red";
        status.textContent = "SYSTEM_FAILURE: " + err.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
