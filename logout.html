<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Logout - SCSS6027</title>

  <!-- Universal public stylesheet from MAIN -->
  <link rel="stylesheet" href="https://scss6027.github.io/main/style-public.css">

  <!-- Dynamic includes from MAIN -->
  <script src="https://scss6027.github.io/main/include-public.js" defer></script>

  <style>
    main {
      max-width: 500px;
      margin: 80px auto;
      padding: 30px;
      text-align: center;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      background-color: #fff;
    }

    #logoutMsg {
      font-size: 1.2rem;
      font-weight: bold;
      color: #d9534f;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- Dynamic header -->
  <div id="header"></div>

  <!-- Dynamic nav -->
  <div id="nav"></div>

  <main>
    <h2>User Logout</h2>
    <p id="logoutMsg">
      Logging out of your session...
    </p>
    <p>Redirecting to the login page in 2 seconds.</p>
  </main>

  <!-- Dynamic footer -->
  <div id="footer"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Wipe ONLY the user login session keys
      sessionStorage.removeItem("consoleAuth");
      sessionStorage.removeItem("scss_admin_session");

      // 2. Redirect back to login.html
      setTimeout(() => {
        window.location.href = "login.html";
      }, 2000);
    });
  </script>
</body>
</html>
